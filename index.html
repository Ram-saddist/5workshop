<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: sans-serif;
            margin: 0px;
        }
        .navbar{
            display: flex;
           justify-content: space-between;
           padding: 10px;
           background-color: white;
        }
        .logo{
            width: 20%;
        }
        .logo img{
            width: 20%;
            vertical-align: middle;
        }
        .logo span{
            font-size: 1.3rem;
        }
        .nav-links a, .nav-buttons a{
            text-decoration: none;
            color: black;
            font-size: 0.9rem;
            margin:0px 10px;
            font-weight: bold
        }
        .nav-buttons .sign{
            background-color: blue;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }
        .hero-container{
            padding: 5%;
            background-image: url("images/hero-section.png");
            background-size: 100% 450px;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .learn{
            color: blue;
            font-weight: bold;
        }
        .hero-container h1{
            font-size: 3rem;
        }
        .description{
            color: rgba(0, 0, 0, 0.796);
            font-size: 0.9rem;
        }
        .hero-buttons button{
            padding: 10px;
            color: blue;
            border:1px solid blue;
            border-radius: 5px;
            background-color: inherit;
        }
        .hero-buttons button:hover{
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="./images/logo.png" width="5%" alt=""/>
            <span> <b>Learnify</b></span>
        </div>
        <div class="nav-links">
            <a href="https://www.google.com">Home</a>
            <a href="">About Us</a>
            <a href="">Courses</a>
            <a href="">Contact</a>
        </div>
        <div class="nav-buttons">
            <a href="">Login</a>
            <a class="sign" href="">Sign Up</a>
        </div>
    </nav>

    <div class="hero-container">
        <div class="learn-block">
            <p class="learn">Learn.Grow.Succeed</p>
            <h1>Learn New Skills <br/> <span style="color: blue;">Anywhere</span></h1>
            <p class="description">Access Quality courses from expert instructors <br>and advance your career</p>
            <div class="hero-buttons">
                <button>Browser Courses</button>
                <button>How it works</button>
            </div>
        </div>
    </div>

</body>
</html>
